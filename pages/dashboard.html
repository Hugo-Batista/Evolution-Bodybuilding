<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <title>Acesso painel - Academia</title>
</head>

<body>
  <div class="dash-container">

    <aside class="sidebar">
      <div class="brand">
        <h2><i class="fas fa-dumbbell"></i> Academia</h2>
        <p class="sidebar-subtitle">Painel de treinos</p>
      </div>

      <nav class="navegacao">
        <ul>
          <li><a class="perfil" href="profile.html" id="perfilLink"><i class="fas fa-user"></i> Meu Perfil</a></li>
          <li><a class="history" href="history.html"><i class="fas fa-history"></i> Histórico</a></li>
          <li><a class="sair" href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div>
          <h1>Minha Ficha</h1>
          <p class="welcome">Bem-vindo, <span id="user-email">Usuário</span></p>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i></button>
        </div>
      </header>

      <section class="workout-grid">
        <button type="button" class="card" data-workout="peito">
          <i class="fas fa-heart"></i>
          <span>Peito / Ombro / Tríceps</span>
        </button>
        <button type="button" class="card" data-workout="costa">
          <i class="fas fa-backward"></i>
          <span>Costa / Bíceps</span>
        </button>
        <button type="button" class="card" data-workout="perna-quadriceps">
          <i class="fas fa-running"></i>
          <span>Perna (Quadríceps)</span>
        </button>
        <button type="button" class="card" data-workout="perna-posteriores">
          <i class="fas fa-walking"></i>
          <span>Perna (Posteriores)</span>
        </button>
      </section>

      <section class="workout-details" aria-live="polite">
        <h2>Detalhes do treino</h2>
        <p id="workout-details-text">Selecione um treino acima para ver o plano.</p>
      </section>
    </main>

  </div>

  <script src="../js/dashboard.js"></script>
</body>

</html>
