<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <title>Meu Perfil - Academia</title>
</head>

<body>
  <div class="dash-container">

    <aside class="sidebar">
      <div class="brand">
        <h2><i class="fas fa-dumbbell"></i> Academia</h2>
        <p class="sidebar-subtitle">Painel de treinos</p>
      </div>

      <nav class="navegacao">
        <ul>
          <li><a href="dashboard.html"><i class="fas fa-home"></i>Painel</a></li>
          <li><a href="profile.html" class="active"><i class="fas fa-user"></i> Meu Perfil</a></li>
          <li><a href="history.html"><i class="fas fa-history"></i> Histórico</a></li>
          <li><a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div>
          <h1><i class="fas fa-user"></i> Meu Perfil</h1>
          <p class="welcome">Gerencie suas informações pessoais</p>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="theme-btn" type="button" aria-label="Alternar tema" title="Alternar tema"><i class="fas fa-moon"></i></button>
        </div>
      </header>

      <section class="profile-form">
        <form id="profileForm">
          <div class="form-group">
            <label for="profileName">Nome:</label>
            <input type="text" id="profileName" placeholder="Seu nome completo">
          </div>

          <div class="form-group">
            <label for="profileEmail">E-mail:</label>
            <input type="email" id="profileEmail" placeholder="seu@email.com" readonly>
          </div>

          <div class="form-group">
            <label for="profilePassword">Nova Senha (opcional):</label>
            <input type="password" id="profilePassword" placeholder="Deixe em branco para manter">
          </div>

          <div class="form-group">
            <label for="profileConfirmPassword">Confirmar Nova Senha:</label>
            <input type="password" id="profileConfirmPassword" placeholder="Confirme a nova senha">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar Alterações</button>
            <button type="button" id="deleteAccount" class="btn-secondary">Excluir Conta</button>
          </div>
        </form>
      </section>
    </main>

  </div>

  <script src="../js/profile.js"></script>
</body>

</html>
