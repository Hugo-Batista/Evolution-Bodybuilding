<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Cadastro - Academia</title>
</head>

<body>
  <main class="container">
    <section class="action-card">
      <form class="login-form">
        <div class="form-input">
          <label for="name-usuario">Nome:</label>
          <input class="input" type="text" id="name-usuario" placeholder="Digite seu nome">
        </div>

        <div class="form-input">
          <label for="email-usuario">E-mail:</label>
          <input class="input" type="email" id="email-usuario" placeholder="Digite seu e-mail">
        </div>

        <div class="group-input">
          <label for="senha-usuario">Senha:</label>
          <input class="input" type="password" id="senha-usuario" placeholder="Digite sua senha">
        </div>

        <div class="group-input">
          <label for="senha-confirm">Confirmar senha:</label>
          <input class="input" type="password" id="senha-confirm" placeholder="Repita sua senha">
        </div>

        <div class="form-actions">
          <button class="btn" id="registerButton">Cadastrar</button>
          <p class="message-paragraph" id="message"></p>
        </div>

        <div class="signup-footer">
          <p>Já possui conta?</p>
          <a href="index.html">Entrar</a>
        </div>
      </form>
    </section>
  </main>

  <script src="register.js"></script>
</body>

</html>
